name: Build and Push Docker Images

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build (comma-separated: manager,agent or "all")'
        required: true
        default: 'all'
        type: string
      push_images:
        description: 'Push images to registry'
        required: true
        default: true
        type: boolean
  
  push:
    # Auto-trigger on version tags
    tags:
      - 'v*.*.*'
    
    # Auto-trigger on main branch changes
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'apps/agent/**'
      - 'packages/**'
      - 'Dockerfile'

env:
  REGISTRY: ghcr.io
  MANAGER_IMAGE: vpn-manager
  AGENT_IMAGE: vpn-agent
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Determine which images to build
  prepare:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-images.outputs.images }}
      should_build: ${{ steps.set-images.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
      
      - name: Determine images to build
        id: set-images
        run: |
          # Default: build all images
          IMAGES='["manager","agent"]'
          SHOULD_BUILD="true"
          
          # If manual trigger with specific images
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.images }}"
            if [ "$INPUT" != "all" ]; then
              # Convert comma-separated to JSON array
              IMAGES=$(echo "$INPUT" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";""))')
            fi
            SHOULD_BUILD="${{ inputs.push_images }}"
          fi
          
          # If triggered by tag, build all
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            IMAGES='["manager","agent"]'
            SHOULD_BUILD="true"
          fi
          
          # If triggered by push, detect changed files
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" != refs/tags/* ]]; then
            CHANGED_IMAGES=()
            
            # Check if manager files changed (web, api, or Dockerfile)
            if git diff --name-only HEAD^ HEAD | grep -qE "^(apps/api/|apps/web/|Dockerfile)"; then
              CHANGED_IMAGES+=("manager")
            fi
            
            # Check if agent files changed
            if git diff --name-only HEAD^ HEAD | grep -q "^apps/agent/"; then
              CHANGED_IMAGES+=("agent")
            fi
            
            # Check if shared packages changed (rebuild all)
            if git diff --name-only HEAD^ HEAD | grep -q "^packages/"; then
              CHANGED_IMAGES=("manager" "agent")
            fi
            
            # If no images changed, skip build
            if [ ${#CHANGED_IMAGES[@]} -eq 0 ]; then
              echo "No image files changed, skipping build"
              SHOULD_BUILD="false"
            else
              IMAGES=$(printf '%s\n' "${CHANGED_IMAGES[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          
          echo "images=$IMAGES" >> $GITHUB_OUTPUT
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "Images to build: $IMAGES"
          echo "Should build: $SHOULD_BUILD"

  build-and-push:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        image: ${{ fromJson(needs.prepare.outputs.images) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set image name and dockerfile
        id: image-config
        run: |
          if [ "${{ matrix.image }}" = "manager" ]; then
            echo "image_name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MANAGER_IMAGE }}" >> $GITHUB_OUTPUT
            echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "image_name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.AGENT_IMAGE }}" >> $GITHUB_OUTPUT
            echo "dockerfile=apps/agent/Dockerfile" >> $GITHUB_OUTPUT
          fi
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-config.outputs.image_name }}
          flavor: |
            latest=auto
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix={{branch}}-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.image-config.outputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_images == true) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.image }}
            type=registry,ref=${{ steps.image-config.outputs.image_name }}:latest
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # Uncomment for multi-arch builds (slower)
          # platforms: linux/amd64,linux/arm64,linux/s390x,linux/ppc64le
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
      
      - name: Image digest
        run: |
          echo "Image: ${{ steps.image-config.outputs.image_name }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.meta.outputs.digest }}"
  
  test-deployment:
    needs: [prepare, build-and-push]
    if: needs.prepare.outputs.should_build == 'true' && contains(needs.prepare.outputs.images, 'manager') && (github.event_name != 'workflow_dispatch' || inputs.push_images == true)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create test environment
        run: |
          cp .env.production .env
          
          # Set test JWT secret
          sed -i 's/CHANGE_ME_TO_SECURE_RANDOM_STRING_MIN_32_CHARS/test-secret-key-for-ci-testing-only-32chars/' .env
          
          # Add VPN_TOKEN
          echo "VPN_TOKEN=test-vpn-token-for-ci" >> .env
      
      - name: Pull manager image
        run: |
          # Pull the image that was just built
          docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MANAGER_IMAGE }}:latest
          
          # Tag it for docker-compose
          docker tag ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MANAGER_IMAGE }}:latest ghcr.io/${{ github.repository_owner }}/${{ env.MANAGER_IMAGE }}:latest
      
      - name: Start manager service
        run: |
          docker compose up -d manager
          echo "Waiting for manager to be ready..."
          
          # Show container status
          docker compose ps
          
          # Wait for container to start (max 30 seconds)
          for i in {1..6}; do
            if docker compose ps manager | grep -q "Up"; then
              echo "Manager container is up!"
              break
            fi
            echo "Waiting for container to start... ($i/6)"
            sleep 5
          done
          
          # Show logs
          echo "=== Manager Logs (initial) ==="
          docker compose logs manager
          
          # Wait for services to be ready (max 2 minutes)
          echo "Waiting for services to be ready..."
          for i in {1..24}; do
            # Check if API is responding
            if curl -f http://localhost:3000/api/v1/health 2>/dev/null; then
              echo "API is ready!"
              break
            fi
            echo "Waiting for API... ($i/24)"
            sleep 5
          done
      
      - name: Check service health
        run: |
          echo "Testing API health endpoint..."
          curl -v http://localhost:3000/api/v1/health || exit 1
          
          echo "Testing Web UI..."
          curl -v http://localhost:3000 || exit 1
          
          echo "All services are healthy!"
      
      - name: View logs on failure
        if: failure()
        run: |
          echo "=== Manager Logs ==="
          docker compose logs manager
          
          echo "=== Container Status ==="
          docker compose ps
          
          echo "=== Docker Processes ==="
          docker ps -a
      
      - name: Cleanup
        if: always()
        run: |
          docker compose down -v

  # Create GitHub Release on version tags
  create-release:
    needs: [prepare, build-and-push, test-deployment]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            ## VPN Manager v${{ steps.version.outputs.version }}
            
            ### Docker Images
            
            **Manager (Web + API):**
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/vpn-manager:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/vpn-manager:latest
            ```
            
            **Agent:**
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/vpn-agent:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/vpn-agent:latest
            ```
            
            ### Quick Start
            
            **Deploy Manager:**
            ```bash
            docker compose up -d
            ```
            
            **Deploy Agent:**
            ```bash
            docker compose -f docker-compose.agent.yml up -d
            ```
          draft: false
          prerelease: false
