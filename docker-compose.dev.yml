# ============================================================
# VPN Manager — Development Docker Compose
# ============================================================
# ⚠️  WARNING: FOR DEVELOPMENT ONLY - NOT FOR PRODUCTION!
#
# Security Notes:
# - Uses weak passwords (OK for local dev)
# - Exposes database ports (OK for local dev)
# - Uses host network for agent (OK for local dev)
# - Mounts source code as volumes (OK for local dev)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml --profile postgres up
#   docker compose -f docker-compose.dev.yml --profile mysql up
#   docker compose -f docker-compose.dev.yml --profile agent up
# ============================================================

services:
  # ── Development Databases ──
  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres-dev
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn_dev
      POSTGRES_DB: vpn_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vpn" ]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [ postgres ]
    networks:
      - vpn-dev-network

  mariadb:
    image: mariadb:11
    container_name: vpn-mariadb-dev
    environment:
      MARIADB_USER: vpn
      MARIADB_PASSWORD: vpn_dev
      MARIADB_DATABASE: vpn_dev
      MARIADB_ROOT_PASSWORD: root_dev
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [ mysql ]
    networks:
      - vpn-dev-network

  # ── Development API — Hot-reload with tsx watch ──
  api:
    image: node:24-alpine
    container_name: vpn-api-dev
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ && npm install -g pnpm && pnpm install && pnpm --filter @vpn/api dev"
    environment:
      NODE_ENV: development
      PORT: "3000"
      # ⚠️  DEV ONLY: Weak secret for development
      JWT_SECRET: dev-secret-please-change-in-production-32chars
      JWT_EXPIRES_IN: 7d
      NODE_REGISTRATION_KEY: ${NODE_REGISTRATION_KEY:-dev-registration-key}
      VPN_TOKEN: ${VPN_TOKEN:-dev-vpn-token}
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SQLITE_PATH: /data/vpn.sqlite
      WEB_URL: ${WEB_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - api_dev_data:/data
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules_cache:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 5m # first run compiles better-sqlite3 from source (~3-4 min)
    networks:
      - vpn-dev-network

  # ── Development Web UI — Vite dev server with hot-reload ──
  web:
    image: node:24-alpine
    container_name: vpn-web-dev
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ && npm install -g pnpm && pnpm install && pnpm --filter @vpn/web dev"
    environment:
      NODE_ENV: development
      # In Docker, browser fetches go via host machine so localhost:3000 is correct
      # (Vite embeds this into the JS bundle at build time via import.meta.env)
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules_cache:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vpn-dev-network

  # ── Development Agent (optional) ──
  # ⚠️  WARNING: Uses host network and privileged capabilities
  # Only use for local VPN testing, never in production!
  agent:
    image: node:24-alpine
    container_name: vpn-agent-dev
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter @vpn/agent dev"
    environment:
      NODE_ENV: development
      AGENT_MANAGER_URL: ${AGENT_MANAGER_URL:-http://localhost:3000}
      AGENT_NODE_ID: ${AGENT_NODE_ID:-dev-node-1}
      AGENT_SECRET_TOKEN: ${AGENT_SECRET_TOKEN:-dev-token}
      VPN_TOKEN: ${VPN_TOKEN:-dev-vpn-token}
      AGENT_POLL_INTERVAL_MS: 5000
      AGENT_HEARTBEAT_INTERVAL_MS: 30000
      FIREWALL_ENGINE: ${FIREWALL_ENGINE:-auto}
      VPN_TYPE: ${VPN_TYPE:-openvpn}
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules_cache:/app/node_modules
      # Mount VPN directories if available (optional)
      # - /run/openvpn:/run/openvpn
      # - /etc/openvpn/server:/etc/openvpn/server:ro
      # - /var/log/openvpn:/var/log/openvpn:ro
      # ⚠️  Host network required for VPN management interface access
    network_mode: host
    profiles: [ agent ]

networks:
  vpn-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
  mariadb_dev_data:
  api_dev_data:
  pnpm_store:
  node_modules_cache:
