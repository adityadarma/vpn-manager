# ============================================================
# VPN Manager — Docker Compose (Production)
# ============================================================
# Single container: Fastify serves both API and Vite static UI
# Only one port exposed: 3000
#
# Usage:
#   docker compose up -d                             # SQLite (default)
#   docker compose --profile postgres up -d          # PostgreSQL
#   docker compose --profile mysql up -d             # MySQL/MariaDB
# ============================================================

services:
  # ── Databases ──
  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ postgres ]
    networks:
      - vpn-network

  mariadb:
    image: mariadb:11
    container_name: vpn-mariadb
    restart: unless-stopped
    environment:
      MARIADB_USER: ${MARIADB_USER:-vpn}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-vpn_secret}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-vpn}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ mariadb ]
    networks:
      - vpn-network

  # ── VPN Manager (Web + API) ──
  manager:
    image: ghcr.io/adityadarma/vpn-manager:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-manager
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_REGISTRATION_KEY: ${NODE_REGISTRATION_KEY}
      VPN_TOKEN: ${VPN_TOKEN}
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SQLITE_PATH: /data/vpn.sqlite
      WEB_STATIC_PATH: /app/web
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - manager_data:/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:${PORT:-3000}/api/v1/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vpn-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vpn-network:
    driver: bridge

volumes:
  postgres_data:
  mariadb_data:
  manager_data:
